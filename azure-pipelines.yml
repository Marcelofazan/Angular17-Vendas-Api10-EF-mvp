trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  npm_config_cache: $(Pipeline.Workspace)/.npm
  dotnetVersion: '10.0.x'

steps:
# ================= CONFIGURAÇÃO DE AMBIENTE =================
- task: UseNode@1
  inputs:
    version: '20.x'
  displayName: 'Ambiente: Instalar Node.js'

- task: UseDotNet@2
  inputs:
    version: '$(dotnetVersion)'
    packageType: 'sdk'
  displayName: 'Ambiente: Instalar .NET 10 SDK'

- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | Frontend/package.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: $(npm_config_cache)
  displayName: 'Garantir Cache do NPM'

# ================= PIPELINE DO FRONTEND (ANGULAR 17) =================
- script: npm install --legacy-peer-deps
  workingDirectory: '$(Build.SourcesDirectory)/Frontend'
  displayName: 'Frontend: Instalar dependências'

- script: npm run build -- --configuration production
  workingDirectory: '$(Build.SourcesDirectory)/Frontend'
  displayName: 'Frontend: Compilar o projeto Angular'

# ================= PIPELINE DO BACKEND (.NET 10) =================
- script: |
    # Busca o caminho absoluto e garante que não falhe
    NET_PATH=$(find "$(Build.SourcesDirectory)/Backend" -name "*.sln" -o -name "*.csproj" -exec dirname {} \; | head -n 1)
    if [ -z "$NET_PATH" ]; then NET_PATH="$(Build.SourcesDirectory)/Backend"; fi
    echo "Diretório .NET detectado: $NET_PATH"
    echo "##vso[task.setvariable variable=detectedNetDir]$NET_PATH"
  displayName: 'Backend: Detectar pasta do projeto'

- script: dotnet restore
  workingDirectory: $(detectedNetDir)
  displayName: 'Backend: Restaurar pacotes Nuget'

- script: dotnet build --configuration $(buildConfiguration) --no-restore
  workingDirectory: $(detectedNetDir)
  displayName: 'Backend: Compilar o projeto .NET'

- script: dotnet test --configuration $(buildConfiguration) --no-build --logger trx
  workingDirectory: $(detectedNetDir)
  displayName: 'Backend: Executar testes'
  condition: always()

- script: dotnet publish --configuration $(buildConfiguration) --output "$(Build.ArtifactStagingDirectory)/ApiPublish" --no-build
  workingDirectory: $(detectedNetDir)
  displayName: 'Backend: Publicar para Deploy'

# ================= SALVAR ARTEFATOS PARA DEPLOY =================
- script: |
    # Mapeia de forma absoluta onde o Angular gerou o index.html
    DIST_TARGET=$(find "$(Build.SourcesDirectory)/Frontend/dist" -name "index.html" -exec dirname {} \; | head -n 1)
    if [ -z "$DIST_TARGET" ]; then DIST_TARGET="$(Build.SourcesDirectory)/Frontend/dist"; fi
    echo "Diretório Angular Dist detectado: $DIST_TARGET"
    echo "##vso[task.setvariable variable=detectedAngularDist]$DIST_TARGET"
  displayName: 'Mapear Saída do Angular'

# CORREÇÃO: Chamada da variável corrigida para o formato de runtime do Pipeline
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(detectedAngularDist)'
    ArtifactName: 'frontend-drop'
    publishLocation: 'Container'
  displayName: 'Publicar Artefato: Frontend'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/ApiPublish'
    ArtifactName: 'backend-drop'
    publishLocation: 'Container'
  displayName: 'Publicar Artefato: Backend'

# ================= AUTO DEPLOY NO RENDER VIA WEBHOOK =================
- script: |
    echo "Sinalizando o Render para puxar as atualizações..."
    curl -X POST "$(RENDER_FRONTEND_HOOK)"
    echo -e "\nFrontend atualizado."
    curl -X POST "$(RENDER_BACKEND_HOOK)"
    echo -e "\nBackend updated."
  displayName: 'Render: Disparar Auto-Deploy Webhook'
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
