trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  npm_config_cache: $(Pipeline.Workspace)/.npm
  dotnetVersion: '10.0.x'

steps:
# ================= CONFIGURAÇÃO DE AMBIENTE =================
- task: UseNode@1
  inputs:
    version: '20.x'
  displayName: 'Ambiente: Instalar Node.js'

- task: UseDotNet@2
  inputs:
    version: '$(dotnetVersion)'
    packageType: 'sdk'
  displayName: 'Ambiente: Instalar .NET 10 SDK'

- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | Frontend/package.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: $(npm_config_cache)
  displayName: 'Garantir Cache do NPM'

# ================= PIPELINE DO FRONTEND (ANGULAR 17) =================
- script: npm install --legacy-peer-deps
  workingDirectory: '$(Build.SourcesDirectory)/Frontend'
  displayName: 'Frontend: Instalar dependências'

- script: npm run build -- --configuration production
  workingDirectory: '$(Build.SourcesDirectory)/Frontend'
  displayName: 'Frontend: Compilar o projeto Angular'

# ================= PIPELINE DO BACKEND (.NET 10) =================
- task: DotNetCoreCLI@2
  displayName: 'Backend: Restaurar dependências'
  inputs:
    command: 'restore'
    projects: 'Backend/exemploAPIVendas.slnx'

- task: DotNetCoreCLI@2
  displayName: 'Backend: Compilar API'
  inputs:
    command: 'build'
    projects: 'Backend/exemploAPIVendas.slnx'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Backend: Executar testes'
  inputs:
    command: 'test'
    projects: 'Backend/exemploAPIVendas.slnx'
    arguments: '--configuration $(buildConfiguration) --no-build --no-restore'
  condition: always()

# ALTERADO: Habilitado o zipAfterPublish para True para gerar automaticamente o zip do Backend
- task: DotNetCoreCLI@2
  displayName: 'Backend: Publicar para Deploy'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: 'Backend/exemploAPIVendas/exemploAPIVendas.csproj'
    arguments: '--configuration $(buildConfiguration) -r win-x64 --self-contained false --output $(Build.ArtifactStagingDirectory)/ApiPublish'
    zipAfterPublish: true
    
# ================= COMPACTAR E SALVAR ARTEFATOS PARA DEPLOY =================
- script: |
    DIST_ROOT="$(Build.SourcesDirectory)/Frontend/dist"
    PROJECT_DIST=$(find "$DIST_ROOT" -mindepth 1 -maxdepth 2 -type d | head -n 1)
    if [ -z "$PROJECT_DIST" ]; then PROJECT_DIST="$DIST_ROOT"; fi
    echo "Diretório Completo de Dist do Angular detectado: $PROJECT_DIST"
    echo "##vso[task.setvariable variable=detectedAngularDist]$PROJECT_DIST"
  displayName: 'Mapear Pasta Raiz do Angular'

# ADICIONADO: Compactar os arquivos gerados do Frontend em um arquivo .zip
- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(detectedAngularDist)'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/FrontendPublish/frontend.zip'
    replaceExistingArchive: true
  displayName: 'Frontend: Compactar arquivos para ZIP'

# ALTERADO: PathtoPublish modificado para apontar para o arquivo .zip gerado do Frontend
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/FrontendPublish/frontend.zip'
    ArtifactName: 'frontend-drop'
    publishLocation: 'Container'
  displayName: 'Publicar Artefato: Frontend (ZIP)'

# ALTERADO: PathtoPublish modificado para apontar para o arquivo .zip gerado automaticamente pelo Publish do .NET
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/ApiPublish/exemploAPIVendas.zip'
    ArtifactName: 'backend-drop'
    publishLocation: 'Container'
  displayName: 'Publicar Artefato: Backend (ZIP)'
